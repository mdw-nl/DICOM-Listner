services:
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - protrait
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - protrait
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  dicom-sorter:
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    build: .
    image: dicom-listner:latest
    container_name: dicom-sorter
    environment:
      - PYTHONUNBUFFERED=1
    command: ["./start.sh"]
    ports:
      - "104:104"
      - "9000:9000"
    networks:
      - protrait
    volumes:
      - ./associationdata:/dicomsorter/data
      - ./recipes:/dicomsorter/recipes

  anonymizer-worker:
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    image: dicom-listner:latest
    container_name: anonymizer-worker
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - ANONYMIZER_DICOM_BATCH_SIZE=100
    command: ["python", "anonymizer_worker.py"]
    networks:
      - protrait
    volumes:
      - ./associationdata:/dicomsorter/data
      - ./recipes:/dicomsorter/recipes

  xnat-worker:
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    image: dicom-listner:latest
    container_name: xnat-worker
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "xnat_worker.py"]
    networks:
      - protrait
    volumes:
      - ./associationdata:/dicomsorter/data
      - ./recipes:/dicomsorter/recipes

networks:
  protrait:
    driver: bridge
